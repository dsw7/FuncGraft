# --------------------------------------------------
# FuncGraft
# See https://github.com/dsw7/FuncGraft for more information
# --------------------------------------------------

[general]
# Specify which provider to connect to
# Options are "openai" and "ollama"
provider = "openai"

[openai]
# Specify a default OpenAI model to use such as "gpt-4o"
model = "gpt-4o"

[ollama]
# Specify Ollama host
host = "localhost"

# Specify Ollama port
port = 11434

# Specify a default Ollama model to use such as "gemma3:latest"
model = "gemma3:latest"
